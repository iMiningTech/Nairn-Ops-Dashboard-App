AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Static hosting for the Nairn Det Plant inventory dashboard — a private S3 bucket
  fronted by CloudFront with Origin Access Control (bucket is NOT public; only
  CloudFront can read it). The dashboard is a Next.js static export that calls the
  data API (Apps Script today, AWS later) from the browser. Plain CloudFormation
  (no Lambda) — deploy with `aws cloudformation deploy`.

Parameters:
  Customer:
    Type: String
    Default: nairn-detplant
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: prod
  # Friendly custom domain (defaults baked in so re-runs of deploy.sh keep it).
  DomainName:
    Type: String
    Default: nairn.dashboard.imining.tech
  AcmCertificateArn:
    Type: String
    Default: arn:aws:acm:us-east-1:432046692351:certificate/7be24ed3-0f1c-4c7f-9184-0ac429a62dfe
  HostedZoneId:
    Type: String
    Default: Z059055514270AX176EJV   # dashboard.imining.tech

Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Customer}-dashboard-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${Customer}-dashboard-${Environment}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${Customer} inventory dashboard (${Environment})"
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        Aliases: !If [HasDomain, [!Ref DomainName], !Ref "AWS::NoValue"]
        ViewerCertificate: !If
          - HasDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # AWS managed: CachingOptimized
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  # Friendly DNS → CloudFront (IPv4 + IPv6 aliases). CloudFront's fixed zone id.
  DnsA:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false
  DnsAAAA:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  BucketName:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref Distribution
  Url:
    Description: CloudFront URL.
    Value: !Sub "https://${Distribution.DomainName}"
  FriendlyUrl:
    Description: Share this with the team.
    Value: !If [HasDomain, !Sub "https://${DomainName}", !Sub "https://${Distribution.DomainName}"]
